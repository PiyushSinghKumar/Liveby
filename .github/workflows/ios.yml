name: iOS Build

on:
  workflow_dispatch:          # disabled - re-enable when Apple Developer account is set up

jobs:
  build:
    runs-on: macos-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      # ── Next.js static export ───────────────────────────────────────────────
      - name: Build Next.js
        run: npm run build

      # ── Capacitor sync ──────────────────────────────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync ios

      # ── Build for Simulator (no signing needed) ─────────────────────────────
      - name: Build for Simulator
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
          | xcpretty || true

      # ── Upload .app as artifact ─────────────────────────────────────────────
      - name: Upload Simulator App
        uses: actions/upload-artifact@v4
        with:
          name: Liveby-simulator
          path: ios/build/Build/Products/Debug-iphonesimulator/App.app
          retention-days: 14
