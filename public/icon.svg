<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" style="stop-color:#1c1c30"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </radialGradient>
    <linearGradient id="ring" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
    <linearGradient id="check" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle inner highlight top-left -->
  <rect width="100" height="100" rx="22" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>

  <!-- Soft halo behind ring -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="rgba(99,102,241,0.15)" stroke-width="12"/>

  <!-- Main ring -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="url(#ring)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Checkmark -->
  <polyline
    points="31,50 43,63 69,35"
    fill="none"
    stroke="url(#check)"
    stroke-width="6.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
</svg>
